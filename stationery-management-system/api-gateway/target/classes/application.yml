server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # ─── Routes ───────────────────────────────────────────────────────────
      # Each route: path prefix → microservice (load-balanced via Eureka)
      routes:
        # Auth Service — public + authenticated auth endpoints
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - JwtAuthFilter   # applies our custom JWT filter

        # Inventory Service — requires authentication
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - JwtAuthFilter

        # Request Service — requires authentication
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/api/requests/**
          filters:
            - JwtAuthFilter

      # Remove duplicate CORS headers that might come from downstream services
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

  # Config Server — fetch shared config (jwt.secret etc.)
  config:
    uri: http://localhost:8888
    fail-fast: false  # false so gateway can start even if config-server is down during dev

# Eureka client registration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

# JWT secret — also loaded from Config Server; this is the fallback for standalone dev
jwt:
  secret: sms-super-secret-jwt-key-2024-capstone-project-secure

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.sms.gateway: DEBUG
