server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          # Local Git repository — path to ~/sms-config folder
          # Use forward slashes on Windows or 'file:///' prefix
          uri: file:///${user.home}/sms-config
          default-label: main
          # Clone on start to fail fast if repo is missing
          clone-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: INFO
