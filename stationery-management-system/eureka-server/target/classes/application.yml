server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    # Standalone mode — do not register with itself or fetch from itself
    register-with-eureka: false
    fetch-registry: false
  server:
    # Don't wait for peers on startup (standalone mode)
    wait-time-in-ms-when-sync-empty: 0
    # Reduce eviction interval for dev speed
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
