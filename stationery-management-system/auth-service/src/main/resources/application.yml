server:
  port: 8081

spring:
  application:
    name: auth-service

  # --- Database -------------------------------------------------------------
  datasource:
    # JDBC URL: connects to MySQL, automatically creating the auth_db database if it doesn't exist
    url: jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- JPA / Hibernate ------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update        # Auto-creates/updates tables in dev (use validate in prod)
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect # explicitly set MySQL 8 engine dialect
        format_sql: true # pretty-prints SQL output in the console logs for readability

  # --- Config Server (optional for local dev without config server) ---------
  # optional: prefix prevents service startup failure if Config Server isn't running locally
  config:
    import: optional:configserver:http://localhost:8888

# --- Eureka Client Settings ------------------------------------------------
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
    prefer-ip-address: true # registers the service's IP instead of hostname (resolves docker network resolution issues)

# --- JWT (fallback if Config Server is not available) ---------------------
jwt:
  secret: sms-super-secret-jwt-key-2024-capstone-project-secure
  expiration: 86400000   # 24 hours in milliseconds

# --- Swagger / OpenAPI ----------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# --- Actuator -------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics # exposes internal health checks and performance metrics for monitoring
  endpoint:
    health:
      show-details: always

# --- Logging Levels -------------------------------------------------------
logging:
  level:
    com.sms.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG # logs raw SQL statements for easier query troubleshooting
